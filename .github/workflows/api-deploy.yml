name: API Deploy

on:
  push:
    branches: [ "main" ]
    paths:
      - '241RunnersAPI/**'
      - '.github/workflows/api-deploy.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - '241RunnersAPI/**'
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: |
          cd 241RunnersAPI
          dotnet restore

      - name: Build
        run: |
          cd 241RunnersAPI
          dotnet build --configuration Release --no-restore

      - name: Test
        run: |
          cd 241RunnersAPI
          dotnet test --configuration Release --no-build --verbosity normal || echo "Tests skipped - no test projects found"

      - name: Publish
        run: |
          cd 241RunnersAPI
          dotnet publish -c Release -o publish --no-build

      - name: Login to Azure
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Configure App Service (Azure SQL + JWT)
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        env:
          APP_NAME: ${{ secrets.AZURE_WEBAPP_NAME }}
          AZURE_CS: ${{ secrets.AZURE_SQL_CONNECTION_STRING }}
          JWT_KEY: ${{ secrets.JWT_KEY }}
        run: |
          RG=$(az webapp list --query "[?name=='$APP_NAME'].resourceGroup | [0]" -o tsv)
          echo "App: $APP_NAME  RG: $RG"
          if [[ -z "$AZURE_CS" ]]; then
            echo "AZURE_SQL_CONNECTION_STRING secret is empty"
            exit 1
          fi
          SQL_HOST=$(echo "$AZURE_CS" | sed -nE 's/.*[Ss]erver=(tcp:)?([^,;]+).*/\2/p' | head -1)
          if [[ -z "$SQL_HOST" ]] || ! host "$SQL_HOST" >/dev/null 2>&1; then
            echo "Connection string server does not resolve: ${SQL_HOST:-<missing>}"
            exit 1
          fi
          echo "SQL host resolves: $SQL_HOST"
          # Remove legacy duplicate app setting; ConnectionStrings__DefaultConnection is the source of truth
          az webapp config appsettings delete \
            --name "$APP_NAME" \
            --resource-group "$RG" \
            --setting-names DefaultConnection 2>/dev/null || true
          az webapp config appsettings set \
            --name "$APP_NAME" \
            --resource-group "$RG" \
            --settings \
              "ConnectionStrings__DefaultConnection=$AZURE_CS" \
              "JWT_KEY=$JWT_KEY" \
              "JWT_ISSUER=241RunnersAwareness" \
              "JWT_AUDIENCE=241RunnersAwareness" \
              "ASPNETCORE_ENVIRONMENT=Production"

      - name: Deploy to Azure Web App
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        env:
          APP_NAME: ${{ secrets.AZURE_WEBAPP_NAME }}
        run: |
          RG=$(az webapp list --query "[?name=='$APP_NAME'].resourceGroup | [0]" -o tsv)
          cd 241RunnersAPI/publish
          zip -rq ../deploy.zip .
          az webapp deploy \
            --resource-group "$RG" \
            --name "$APP_NAME" \
            --src-path ../deploy.zip \
            --type zip \
            --async true

      - name: Smoke Test Production
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        run: |
          echo "Waiting for app to start..."
          sleep 45

          for endpoint in \
            "https://241runners-api-v2.azurewebsites.net/healthz" \
            "https://241runners-api-v2.azurewebsites.net/readyz" \
            "https://241runners-api-v2.azurewebsites.net/api/health"
          do
            echo "Testing $endpoint ..."
            for i in 1 2 3 4 5; do
              if curl -fsS --max-time 20 "$endpoint"; then
                echo ""
                echo "OK: $endpoint"
                break
              fi
              echo "Attempt $i failed, retrying in 15s..."
              sleep 15
            done
          done

          echo "Testing login DB path (expect 401)..."
          LOGIN_CODE=$(curl -s -o /tmp/login-smoke.json -w "%{http_code}" --max-time 30 \
            -X POST -H "Content-Type: application/json" \
            -d '{"email":"invalid@example.com","password":"wrong"}' \
            "https://241runners-api-v2.azurewebsites.net/api/v1/auth/login")
          echo "Login HTTP $LOGIN_CODE"
          cat /tmp/login-smoke.json
          if [[ "$LOGIN_CODE" != "401" ]]; then
            echo "Login smoke test failed (expected 401 INVALID_CREDENTIALS)"
            exit 1
          fi

          echo "Production deployment complete."

      - name: Build Success (PR only)
        if: github.event_name == 'pull_request'
        run: |
          echo "API build completed successfully"
          echo "Package ready for deployment: 241RunnersAPI/publish"
