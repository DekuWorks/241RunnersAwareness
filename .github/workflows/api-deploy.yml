name: API Deploy

on:
  push:
    branches: [ "main" ]
    paths:
      - '241RunnersAPI/**'
      - '.github/workflows/api-deploy.yml'
      - 'scripts/setup-supabase.sh'
  pull_request:
    branches: [ "main" ]
    paths:
      - '241RunnersAPI/**'
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: |
          cd 241RunnersAPI
          dotnet restore

      - name: Build
        run: |
          cd 241RunnersAPI
          dotnet build --configuration Release --no-restore

      - name: Test
        run: |
          cd 241RunnersAPI
          dotnet test --configuration Release --no-build --verbosity normal || echo "Tests skipped - no test projects found"

      - name: Publish
        run: |
          cd 241RunnersAPI
          dotnet publish -c Release -o publish --no-build

      - name: Configure App Service (Supabase + JWT)
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        env:
          PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          SUPABASE_CS: ${{ secrets.SUPABASE_CONNECTION_STRING }}
          JWT_KEY: ${{ secrets.JWT_KEY }}
        run: |
          python3 <<'PY'
          import base64
          import json
          import os
          import sys
          import urllib.error
          import urllib.request
          import xml.etree.ElementTree as ET

          profile_xml = os.environ["PUBLISH_PROFILE"]
          root = ET.fromstring(profile_xml)
          publish = None
          for node in root.findall(".//publishProfile"):
              method = (node.get("publishMethod") or "").lower()
              if method in ("msdeploy", "zipdeploy", "web deploy"):
                  publish = node
                  break
          if publish is None:
              publish = root.find(".//publishProfile")
          if publish is None:
              print("No publishProfile found in AZURE_WEBAPP_PUBLISH_PROFILE", file=sys.stderr)
              sys.exit(1)

          publish_url = publish.get("publishUrl", "")
          host = publish_url.split(":")[0]
          if not host.endswith(".scm.azurewebsites.net"):
              host = host.replace(".azurewebsites.net", ".scm.azurewebsites.net")
          username = publish.get("userName")
          password = publish.get("userPWD")
          if not all([host, username, password]):
              print("Publish profile missing scm host or credentials", file=sys.stderr)
              sys.exit(1)

          settings = {
              "ConnectionStrings__DefaultConnection": os.environ["SUPABASE_CS"],
              "JWT_KEY": os.environ["JWT_KEY"],
              "JWT_ISSUER": "241RunnersAwareness",
              "JWT_AUDIENCE": "241RunnersAwareness",
              "ASPNETCORE_ENVIRONMENT": "Production",
          }

          auth = base64.b64encode(f"{username}:{password}".encode()).decode()
          headers = {
              "Authorization": f"Basic {auth}",
              "Content-Type": "application/json",
          }

          def kudu_request(path, method="GET", body=None):
              url = f"https://{host}{path}"
              data = json.dumps(body).encode() if body is not None else None
              req = urllib.request.Request(url, data=data, headers=headers, method=method)
              with urllib.request.urlopen(req, timeout=120) as resp:
                  return resp.read().decode()

          print(f"Applying app settings via Kudu ({host})")
          kudu_request("/api/settings", method="POST", body=settings)
          print("Restarting app")
          kudu_request("/api/restart", method="POST", body={})
          print("App Service configured")
          PY

      - name: Deploy to Azure Web App
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: 241RunnersAPI/publish

      - name: Smoke Test Production
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        run: |
          echo "Waiting for app to start..."
          sleep 45

          for endpoint in \
            "https://241runners-api-v2.azurewebsites.net/healthz" \
            "https://241runners-api-v2.azurewebsites.net/api/health" \
            "https://241runners-api-v2.azurewebsites.net/api/v1.0/auth/health"
          do
            echo "Testing $endpoint ..."
            for i in 1 2 3 4 5; do
              if curl -fsS "$endpoint"; then
                echo ""
                echo "OK: $endpoint"
                break
              fi
              echo "Attempt $i failed, retrying in 15s..."
              sleep 15
            done
          done

          echo "Production deployment complete."

      - name: Build Success (PR only)
        if: github.event_name == 'pull_request'
        run: |
          echo "API build completed successfully"
          echo "Package ready for deployment: 241RunnersAPI/publish"
