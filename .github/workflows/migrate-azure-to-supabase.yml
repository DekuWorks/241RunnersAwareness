name: Migrate Azure SQL to Supabase

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (counts only, no writes)'
        required: false
        default: false
        type: boolean

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Dry run — source counts
        if: inputs.dry_run
        env:
          AZURE_SQL_CONNECTION_STRING: ${{ secrets.AZURE_SQL_CONNECTION_STRING }}
          SUPABASE_CONNECTION_STRING: ${{ secrets.SUPABASE_CONNECTION_STRING }}
        run: |
          dotnet run --project 241RunnersAPI/tools/MigrateToSupabase -- --dry-run

      - name: Migrate data to Supabase
        if: ${{ !inputs.dry_run }}
        env:
          AZURE_SQL_CONNECTION_STRING: ${{ secrets.AZURE_SQL_CONNECTION_STRING }}
          SUPABASE_CONNECTION_STRING: ${{ secrets.SUPABASE_CONNECTION_STRING }}
        run: |
          dotnet run --project 241RunnersAPI/tools/MigrateToSupabase -- --yes
