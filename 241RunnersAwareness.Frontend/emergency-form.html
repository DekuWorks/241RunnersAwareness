<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Emergency Contact Form</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/styles.css"/>
</head>
<body>

  <h1>Add Emergency Contact</h1>

  <form id="emergencyForm">
    <label for="name">Contact Name:</label>
    <input type="text" id="name" required />

    <label for="phone">Phone Number:</label>
    <input type="tel" id="phone" required />

    <label for="relationship">Relationship:</label>
    <input type="text" id="relationship" required />

    <label for="email">Email Address:</label>
    <input type="email" id="email" required />

    <label for="address">Home Address:</label>
    <input type="text" id="address" required />

    <button type="submit">Submit Contact</button>
    <div id="response" style="margin-top: 1em; font-weight: bold;"></div>
  </form>

  <script>
    const individualId = localStorage.getItem("individualId");
    if (!individualId) {
      alert("No individual selected. Please start by entering individual info.");
      window.location.href = "individual-entry.html";
    }

    document.getElementById("emergencyForm").addEventListener("submit", async function(e) {
      e.preventDefault();

      const contact = {
        name: document.getElementById("name").value,
        phoneNumber: document.getElementById("phone").value,
        relationship: document.getElementById("relationship").value,
        email: document.getElementById("email").value,
        address: document.getElementById("address").value,
        individualId: individualId
      };

      try {
        const response = await fetch("https://241runnersawarenessapi.azurewebsites.net/api/EmergencyContact", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(contact)
        });

        if (response.ok) {
          document.getElementById("response").textContent = "✅ Emergency contact saved.";
        } else {
          const errorText = await response.text();
          document.getElementById("response").textContent = "❌ Error: " + errorText;
        }
      } catch (err) {
        document.getElementById("response").textContent = "❌ Network error: " + err.message;
      }
    });
  </script>
</body>
</html>
