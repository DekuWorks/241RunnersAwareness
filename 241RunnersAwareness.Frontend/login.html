<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login - 241Runners</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <h1>Login</h1>

  <form id="loginForm">
    <label for="email">Email:</label>
    <input type="email" id="email" required />

    <label for="password">Password:</label>
    <input type="password" id="password" required />

    <button type="submit">Login</button>
    <div id="loginStatus" style="margin-top: 1em; font-weight: bold;"></div>
  </form>

  <script>
    document.getElementById("loginForm").addEventListener("submit", async function(e) {
      e.preventDefault();

      const login = {
        email: document.getElementById("email").value,
        password: document.getElementById("password").value
      };

      try {
        const res = await fetch("https://241runnersawarenessapi.azurewebsites.net/api/User/Login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(login)
        });

        const loginStatus = document.getElementById("loginStatus");

        if (res.ok) {
          const data = await res.json();
          loginStatus.textContent = "✅ Welcome " + data.username + "! Redirecting...";
          loginStatus.style.color = "green";

          // Store login session
          localStorage.setItem("userId", data.userId);
          localStorage.setItem("username", data.username);

          setTimeout(() => {
            window.location.href = "individual-entry.html";
          }, 1500);
        } else {
          const error = await res.text();
          loginStatus.textContent = "❌ Login failed: " + error;
          loginStatus.style.color = "red";
        }
      } catch (err) {
        document.getElementById("loginStatus").textContent = "❌ Network error: " + err.message;
        loginStatus.style.color = "red";
      }
    });
  </script>
</body>
</html>
