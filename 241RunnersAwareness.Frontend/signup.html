<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sign Up - 241Runners</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="/styles.css" />
  <style>
    .skip-link {
      position: absolute;
      top: -40px;
      left: 0;
      background: black;
      color: white;
      padding: 8px;
      z-index: 100;
    }
    .skip-link:focus {
      top: 0;
    }
  </style>
</head>
<body>
  <a href="#main" class="skip-link">Skip to main content</a>

  <header>
    <h1 id="signupTitle">Sign Up</h1>
    <nav class="navbar">
      <a href="/index.html">← Back to Home</a>
    </nav>
  </header>

  <main id="main">
    <form id="signupForm" role="form" aria-labelledby="signupTitle" aria-describedby="formHelp" novalidate>
      <div id="formHelp" class="visually-hidden">All fields marked required must be filled before submitting.</div>
      <div id="formError" role="alert" style="color: red; display: none;"></div>

      <!-- Full Name -->
      <label for="fullName">Full Name <span aria-hidden="true">*</span></label>
      <input type="text" id="fullName" name="fullName" required aria-required="true" aria-describedby="nameHelp" />
      <small id="nameHelp">Enter your full legal name.</small>

      <!-- Email -->
      <label for="email">Email <span aria-hidden="true">*</span></label>
      <input type="email" id="email" name="email" required aria-required="true" aria-describedby="emailHelp" />
      <small id="emailHelp">We’ll send a confirmation link.</small>

      <!-- Phone -->
      <label for="phone">Phone <span aria-hidden="true">*</span></label>
      <input type="tel" id="phone" name="phone" required aria-required="true" aria-describedby="phoneHelp" />
      <small id="phoneHelp">Mobile or emergency contact number.</small>

      <button type="submit">Continue</button>
    </form>
  </main>

  <script>
    document.getElementById("signupForm").addEventListener("submit", async function(e) {
      e.preventDefault();
      const formError = document.getElementById("formError");
      formError.style.display = "none";

      const data = {
        fullName: document.getElementById("fullName").value.trim(),
        email: document.getElementById("email").value.trim(),
        phone: document.getElementById("phone").value.trim()
      };

      if (!data.fullName || !data.email || !data.phone) {
        formError.textContent = "Please fill out all required fields.";
        formError.style.display = "block";
        return;
      }

      try {
        const response = await fetch("https://241runnersapi.azurewebsites.net/api/Users", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data)
        });

        if (response.ok) {
          alert("Signup successful! Now add individual information.");
          window.location.href = "index2.html";
        } else {
          const error = await response.text();
          formError.textContent = "Signup failed: " + error;
          formError.style.display = "block";
        }
      } catch (err) {
        formError.textContent = "Network error. Try again later.";
        formError.style.display = "block";
      }
    });
  </script>
</body>
</html>
