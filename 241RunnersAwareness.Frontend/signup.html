<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sign Up - 241Runners</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="/styles.css" />
  <style>
    .skip-link {
      position: absolute;
      top: -40px;
      left: 0;
      background: black;
      color: white;
      padding: 8px;
      z-index: 100;
    }
    .skip-link:focus {
      top: 0;
    }
  </style>
</head>
<body>
  <a href="#main" class="skip-link">Skip to main content</a>

  <header>
    <h1 id="signupTitle">Sign Up</h1>
    <nav class="navbar">
      <a href="/index.html">← Back to Home</a>
    </nav>
  </header>

  <main id="main">
    <form id="signupForm" role="form" aria-labelledby="signupTitle" aria-describedby="formHelp" novalidate>
      <div id="formHelp" class="visually-hidden">All fields marked required must be filled before submitting.</div>
      <div id="formError" role="alert" style="color: red; display: none;"></div>

      <!-- Username -->
      <label for="username">Username <span aria-hidden="true">*</span></label>
      <input type="text" id="username" name="username" required aria-required="true" />

      <!-- Email -->
      <label for="email">Email <span aria-hidden="true">*</span></label>
      <input type="email" id="email" name="email" required aria-required="true" />

      <!-- Password -->
      <label for="password">Password <span aria-hidden="true">*</span></label>
      <input type="password" id="password" name="password" required aria-required="true" />

      <button type="submit">Continue</button>
    </form>
  </main>

  <script>
    document.getElementById("signupForm").addEventListener("submit", async function(e) {
      e.preventDefault();
      const formError = document.getElementById("formError");
      formError.style.display = "none";

      const username = document.getElementById("username").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!username || !email || !password) {
        formError.textContent = "❌ All fields must be filled before submitting.";
        formError.style.display = "block";
        return;
      }

      const data = {
        username: username,
        email: email,
        passwordHash: password
      };

      try {
        const response = await fetch("https://241runnersawareness-backend-bhf9dth5hccdeme8.canadacentral-01.azurewebsites.net/api/User/Register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data)
        });

        if (response.ok) {
          alert("✅ Signup successful! Please log in.");
          window.location.href = "login.html";
        } else {
          const error = await response.text();
          formError.textContent = "❌ Signup failed: " + error;
          formError.style.display = "block";
        }
      } catch (err) {
        formError.textContent = "❌ Network error: " + err.message;
        formError.style.display = "block";
      }
    });
  </script>
</body>
</html>
