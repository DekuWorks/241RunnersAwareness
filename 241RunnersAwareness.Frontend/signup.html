<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sign Up - 241Runners</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header>
    <h1>Sign Up</h1>
    <nav class="navbar">
      <a href="/index.html">← Back to Home</a>
    </nav>
  </header>

  <main>
    <form id="signupForm" aria-labelledby="signupTitle" novalidate>
      <div role="alert" id="formError" style="color: red; display: none;"></div>

      <label for="fullName">Full Name</label>
      <input type="text" id="fullName" name="fullName" aria-describedby="nameHelp" required />
      <small id="nameHelp">Enter your full legal name.</small>

      <label for="email">Email</label>
      <input type="email" id="email" name="email" aria-describedby="emailHelp" required />
      <small id="emailHelp">We’ll send a confirmation link.</small>

      <label for="phone">Phone</label>
      <input type="tel" id="phone" name="phone" aria-describedby="phoneHelp" required />
      <small id="phoneHelp">Mobile or emergency contact number.</small>

      <button type="submit">Continue</button>
    </form>
  </main>

  <script>
    document.getElementById("signupForm").addEventListener("submit", async function(e) {
      e.preventDefault();

      const data = {
        fullName: document.getElementById("fullName").value.trim(),
        email: document.getElementById("email").value.trim(),
        phone: document.getElementById("phone").value.trim()
      };

      try {
        const response = await fetch("https://241runnersapi.azurewebsites.net/api/Users", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data)
        });

        if (response.ok) {
          alert("Signup successful! Now add individual information.");
          window.location.href = "index2.html";
        } else {
          const error = await response.text();
          document.getElementById("formError").textContent = "Signup failed: " + error;
          document.getElementById("formError").style.display = "block";
        }
      } catch (err) {
        document.getElementById("formError").textContent = "Network error. Try again later.";
        document.getElementById("formError").style.display = "block";
      }
    });
  </script>
</body>
</html>
